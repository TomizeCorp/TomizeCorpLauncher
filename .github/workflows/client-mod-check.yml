name: Vérifier EpsilonClient

on:
  push:
    branches: [main]
    paths:
      - "client-mod/**"
      - ".github/workflows/client-mod-check.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - run: gradle -p client-mod build --no-daemon
