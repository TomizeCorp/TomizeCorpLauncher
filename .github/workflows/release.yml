name: Publier TomizeCorpLauncher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  client-mod:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Compiler EpsilonClient
        run: gradle -p client-mod build --no-daemon

      - name: Préparer le mod
        run: cp client-mod/build/libs/EpsilonClient-1.0.0.jar EpsilonClient.jar

      - name: Conserver le mod compilé
        uses: actions/upload-artifact@v4
        with:
          name: epsilon-client-mod
          path: EpsilonClient.jar

  release-windows:
    needs: client-mod
    runs-on: windows-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Récupérer EpsilonClient
        uses: actions/download-artifact@v4
        with:
          name: epsilon-client-mod
          path: server-files/mods

      - name: Ajouter Iris et Sodium
        shell: pwsh
        run: |
          Invoke-WebRequest 'https://cdn.modrinth.com/data/YL57xq9U/versions/fDpuVzVr/iris-fabric-1.10.7%2Bmc1.21.11.jar' -OutFile 'server-files/mods/Iris-1.10.7.jar'
          Invoke-WebRequest 'https://cdn.modrinth.com/data/AANobbMI/versions/UddlN6L4/sodium-fabric-0.8.7%2Bmc1.21.11.jar' -OutFile 'server-files/mods/Sodium-0.8.7.jar'

      - name: Générer le manifeste EPSILON
        run: npm run manifest

      - name: Vérifier les sources
        run: |
          node --check src/main.js
          node --check src/renderer/app.js
          node --check src/renderer/epsilon.js

      - name: Compiler et publier Windows
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_PASSWORD }}

  release-macos:
    needs: [client-mod, release-windows]
    runs-on: macos-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Récupérer EpsilonClient
        uses: actions/download-artifact@v4
        with:
          name: epsilon-client-mod
          path: server-files/mods

      - name: Ajouter Iris et Sodium
        run: |
          curl --fail --location 'https://cdn.modrinth.com/data/YL57xq9U/versions/fDpuVzVr/iris-fabric-1.10.7%2Bmc1.21.11.jar' --output 'server-files/mods/Iris-1.10.7.jar'
          curl --fail --location 'https://cdn.modrinth.com/data/AANobbMI/versions/UddlN6L4/sodium-fabric-0.8.7%2Bmc1.21.11.jar' --output 'server-files/mods/Sodium-0.8.7.jar'

      - name: Générer le manifeste EPSILON
        run: npm run manifest

      - name: Vérifier les sources
        run: |
          node --check src/main.js
          node --check src/renderer/app.js
          node --check src/renderer/epsilon.js

      - name: Compiler et publier macOS
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
