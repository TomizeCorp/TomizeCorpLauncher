name: Publier TomizeCorpLauncher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les sources
        run: |
          node --check src/main.js
          node --check src/renderer/app.js
          node --check src/renderer/epsilon.js

      - name: Compiler et publier Windows
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    needs: release-windows
    runs-on: macos-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les sources
        run: |
          node --check src/main.js
          node --check src/renderer/app.js
          node --check src/renderer/epsilon.js

      - name: Compiler et publier macOS
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
