plugins {
    id 'fabric-loom' version '1.17.16'
    id 'maven-publish'
}

version = '1.0.0'
group = 'fr.tomizecorp.epsilon'

base { archivesName = 'EpsilonClient' }

repositories { mavenCentral() }

dependencies {
    minecraft 'com.mojang:minecraft:1.21.11'
    mappings 'net.fabricmc:yarn:1.21.11+build.6:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.19.3'
}

processResources {
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') { expand version: project.version }
    from('../src/renderer/assets/epsilon-logo.png') {
        into 'assets/epsilon'
        rename { 'icon.png' }
    }
}

tasks.withType(JavaCompile).configureEach { options.release = 21 }
java { withSourcesJar(); sourceCompatibility = JavaVersion.VERSION_21; targetCompatibility = JavaVersion.VERSION_21 }
